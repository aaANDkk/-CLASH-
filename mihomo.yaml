######### 🚀 锚点定义区域 start #######
# 1. 统一所有功能分流组的可选节点队列（已新增“韩国”）
pr: &pr {type: select, proxies: [默认, 自动选择, 全部节点, 直连, 香港, 台湾, 日本, 韩国, 新加坡, 美国, 其它地区, 低倍率节点]}

# 2. 统一订阅源的高级健康检查参数（已应用 lazy 优化）
p: &p
  type: http
  health-check:
    enable: true
    lazy: true
    url: "https://www.gstatic.com/generate_204"
    interval: 300
    timeout: 2000               # 🔴 新增：挂掉的节点最多等2秒，防止网页卡死
######### 🚀 锚点定义区域 end #######

proxy-providers:
  provider1:
    <<: *p
    url: "https://"
    override:
      additional-prefix: "[provider1]"

  provider2:
    <<: *p
    url: "https://"
    override:
      additional-prefix: "[provider2]"

proxies: []

mixed-port: 7890
ipv6: false
allow-lan: true
unified-delay: true
tcp-concurrent: true

# 🔴 建议在 proxies 下方直接补上这两行全局保活参数
keep-alive-interval: 30
keep-alive-idle: 600

external-controller: 127.0.0.1:9090

# 修复兼容性
external-ui: ./ui
external-ui-url: "https://github.com/MetaCubeX/metacubexd/archive/refs/heads/gh-pages.zip"

geodata-mode: true

geox-url:
  geoip: "https://github.com/MetaCubeX/meta-rules-dat/releases/download/latest/geoip-lite.dat"
  geosite: "https://github.com/MetaCubeX/meta-rules-dat/releases/download/latest/geosite.dat"
  mmdb: "https://github.com/MetaCubeX/meta-rules-dat/releases/download/latest/country-lite.mmdb"
  asn: "https://github.com/MetaCubeX/meta-rules-dat/releases/download/latest/GeoLite2-ASN.mmdb"

find-process-mode: strict
global-client-fingerprint: chrome

profile:
  store-selected: true
  store-fake-ip: true

# ==================== sniffer 高级优化 ====================
sniffer:
  enable: true

  # 高级优化
  force-dns-mapping: true
  parse-pure-ip: true

  sniff:
    HTTP:
      ports: [80, 8080-8880]
      override-destination: true

    TLS:
      ports: [443, 8443]

    QUIC:
      ports: [443, 8443]

  skip-domain:
    - "+.mi.com"
    - "+.xiaomi.com"
    - "+.push.apple.com"
    - "+.qq.com"
    - "+.baidu.com"

  force-domain: []
tun:
  enable: true
  stack: system
  strict-route: true

  dns-hijack:
    - "any:53"
    - "tcp://any:53"

  auto-route: true
  auto-redirect: true
  auto-detect-interface: true

dns:
  enable: true
  ipv6: false

  enhanced-mode: fake-ip

  # 修复 fake-ip 失效问题
  fake-ip-filter:
    - "+.lan"
    - "+.local"
    - "+.market.xiaomi.com"

  # 新增：DNS 遵循规则
  respect-rules: true

  default-nameserver:
    - tls://223.5.5.5
    - tls://223.6.6.6

  nameserver:
    - "https://doh.pub/dns-query"
    - "https://dns.alidns.com/dns-query"

# 新增 fallback
  fallback:
    - "https://1.1.1.1/dns-query"
    - "https://8.8.8.8/dns-query"

  # 新增 fallback-filter
  fallback-filter:
    geoip: true
    geoip-code: CN

  # 新增：避免节点解析污染
  proxy-server-nameserver:
    - "https://dns.cloudflare.com/dns-query"
    - "https://dns.google/dns-query"

hosts:
  'dns.alidns.com': ['223.5.5.5', '223.6.6.6']
  'doh.pub': ['1.12.12.12', '120.53.53.53']
  'dns.cloudflare.com': ['1.1.1.1', '1.0.0.1']
  'dns.google': ['8.8.8.8', '8.8.4.4']
  'services.googleapis.cn': ['services.googleapis.com']

  '+.mcdn.bilivideo.com': ['0.0.0.0']
  '+.mcdn.bilivideo.cn': ['0.0.0.0']

proxy-groups:

  # ==================== 后台测速组 ====================

  - name: "香港-自动选择"
    type: url-test
    use: [provider1, provider2]
    filter: "(?i)(港|香港|hk|hongkong|hong kong)"
    tolerance: 100
    hidden: true
    icon: "https://fastly.jsdelivr.net/gh/Koolson/Qure@master/IconSet/Color/Auto.png"

  - name: "台湾-自动选择"
    type: url-test
    use: [provider1, provider2]
    filter: "(?i)(台|tw|taiwan)"
    tolerance: 100
    hidden: true
    icon: "https://fastly.jsdelivr.net/gh/Koolson/Qure@master/IconSet/Color/Auto.png"

  - name: "日本-自动选择"
    type: url-test
    use: [provider1, provider2]
    filter: "(?i)(日|jp|japan)"
    tolerance: 100
    hidden: true
    icon: "https://fastly.jsdelivr.net/gh/Koolson/Qure@master/IconSet/Color/Auto.png"

  # ✨ 新增：韩国自动选择
  - name: "韩国-自动选择"
    type: url-test
    use: [provider1, provider2]
    filter: "(?i)(韩|韩国|首尔|kr|korea|south korea)"
    tolerance: 100
    hidden: true
    icon: "https://fastly.jsdelivr.net/gh/Koolson/Qure@master/IconSet/Color/Auto.png"

  - name: "新加坡-自动选择"
    type: url-test
    use: [provider1, provider2]
    filter: "(?i)(新|sg|singapore)"
    tolerance: 100
    hidden: true
    icon: "https://fastly.jsdelivr.net/gh/Koolson/Qure@master/IconSet/Color/Auto.png"

  - name: "美国-自动选择"
    type: url-test
    use: [provider1, provider2]
    filter: "(?i)(美|us|usa|unitedstates|united states|america|los angeles|silicon valley)"
    tolerance: 100
    hidden: true
    icon: "https://fastly.jsdelivr.net/gh/Koolson/Qure@master/IconSet/Color/Auto.png"


  # 🔄 修改：其它地区-自动选择（正则中已排除 🇰🇷|韩|kr|korea）
  - name: "其它地区-自动选择"
    type: url-test
    use: [provider1, provider2]
    filter: "(?i)^(?!.*(?:🇭🇰|🇯🇵|🇺🇸|🇸🇬|🇰🇷|🇨🇳|港|hk|hongkong|台|tw|taiwan|日|jp|japan|韩|kr|korea|新|sg|singapore|美|us|unitedstates|官网|重置|到期|剩余|流量|机场|客服|套餐|订阅|版本)).*"
    tolerance: 100
    hidden: true
    icon: "https://fastly.jsdelivr.net/gh/Koolson/Qure@master/IconSet/Color/Auto.png"

  - name: "低倍率-自动选择"
    type: url-test
    use: [provider1, provider2]
    filter: '(?i)^(?!.*(剩|期|流量|已用|节|官|客)).*(0\.[0-9]+(x|倍率|倍)?|低倍)'
    tolerance: 100
    hidden: true
    icon: "https://fastly.jsdelivr.net/gh/Koolson/Qure@master/IconSet/Color/Auto.png"

  # ==================== 核心组 ====================

  # 🔄 修改：默认组（已加入“韩国”）
  - name: 默认
    type: select
    proxies:
      - 自动选择
      - 全部节点
      - 直连
      - 香港
      - 台湾
      - 日本
      - 韩国
      - 新加坡
      - 美国
      - 其它地区
      - 低倍率节点
    icon: "https://fastly.jsdelivr.net/gh/Koolson/Qure@master/IconSet/Color/Proxy.png"

  - name: 自动选择
    type: url-test
    use: [provider1, provider2]
    exclude-type: direct
    filter: "^(?!.*(?:官网|重置|到期|剩余|流量|机场|客服|套餐|订阅|版本)).*$"
    tolerance: 100
    icon: "https://fastly.jsdelivr.net/gh/Koolson/Qure@master/IconSet/Color/Auto.png"

  - name: 全部节点
    type: select
    include-all: true
    exclude-type: direct
    icon: "https://fastly.jsdelivr.net/gh/Koolson/Qure@master/IconSet/Color/Available.png"

  - name: 直连
    type: select
    proxies: [DIRECT]
    hidden: true
    icon: "https://fastly.jsdelivr.net/gh/Koolson/Qure@master/IconSet/Color/Direct.png"

  # ==================== 功能分流 ====================

  - {name: AI, <<: *pr, icon: "https://fastly.jsdelivr.net/gh/Koolson/Qure@master/IconSet/Color/ChatGPT.png"}

  - {name: Google全家桶, <<: *pr, icon: "https://fastly.jsdelivr.net/gh/Koolson/Qure@master/IconSet/Color/Google_Search.png"}

  - {name: YouTube, <<: *pr, icon: "https://fastly.jsdelivr.net/gh/Koolson/Qure@master/IconSet/Color/YouTube.png"}

  - {name: TikTok, <<: *pr, icon: "https://fastly.jsdelivr.net/gh/Koolson/Qure@master/IconSet/Color/TikTok.png"}

  - {name: 巴哈姆特, <<: *pr, icon: "https://fastly.jsdelivr.net/gh/Koolson/Qure@master/IconSet/Color/Bahamut.png"}

  - {name: 哔哩哔哩, <<: *pr, icon: "https://fastly.jsdelivr.net/gh/Koolson/Qure@master/IconSet/Color/bilibili.png"}
  
  - {name: NETFLIX, <<: *pr, icon: "https://fastly.jsdelivr.net/gh/Koolson/Qure@master/IconSet/Color/Netflix.png"}

  - {name: Spotify, <<: *pr, icon: "https://fastly.jsdelivr.net/gh/Koolson/Qure@master/IconSet/Color/Spotify.png"}

  - {name: Github, <<: *pr, icon: "https://fastly.jsdelivr.net/gh/Koolson/Qure@master/IconSet/Color/GitHub.png"}

  - name: 国内
    type: select
    proxies:
      - 直连
      - 默认
      - 自动选择
    icon: "https://fastly.jsdelivr.net/gh/Koolson/Qure@master/IconSet/Color/China_Map.png"
    hidden: true

  - {name: 其他, <<: *pr, icon: "https://fastly.jsdelivr.net/gh/Koolson/Qure@master/IconSet/Color/Final.png"}

  # ==================== 地区组 ====================

  - name: 香港
    type: select
    use: [provider1, provider2]
    filter: "(?i)(港|香港|hk|hongkong|hong kong)"
    proxies: ["香港-自动选择"]
    icon: "https://fastly.jsdelivr.net/gh/Koolson/Qure@master/IconSet/Color/Hong_Kong.png"

  - name: 台湾
    type: select
    use: [provider1, provider2]
    filter: "(?i)(台|tw|taiwan)"
    proxies: ["台湾-自动选择"]
    icon: "https://fastly.jsdelivr.net/gh/Koolson/Qure@master/IconSet/Color/Taiwan.png"

  - name: 日本
    type: select
    use: [provider1, provider2]
    filter: "(?i)(日|jp|japan)"
    proxies: ["日本-自动选择"]
    icon: "https://fastly.jsdelivr.net/gh/Koolson/Qure@master/IconSet/Color/Japan.png"

  # ✨ 新增：韩国手动/自动选择组
  - name: 韩国
    type: select
    use: [provider1, provider2]
    filter: "(?i)(韩|韩国|首尔|kr|korea|south korea)"
    proxies: ["韩国-自动选择"]
    icon: "https://fastly.jsdelivr.net/gh/Koolson/Qure@master/IconSet/Color/Korea.png"

  - name: 新加坡
    type: select
    use: [provider1, provider2]
    filter: "(?i)(新|sg|singapore)"
    proxies: ["新加坡-自动选择"]
    icon: "https://fastly.jsdelivr.net/gh/Koolson/Qure@master/IconSet/Color/Singapore.png"

  - name: 美国
    type: select
    use: [provider1, provider2]
    filter: "(?i)(美|us|usa|unitedstates|united states|america|los angeles|silicon valley)"
    proxies: ["美国-自动选择"]
    icon: "https://fastly.jsdelivr.net/gh/Koolson/Qure@master/IconSet/Color/United_States.png"

  # 🔄 修改：其它地区（正则中已排除 🇰🇷|韩|kr|korea）
  - name: 其它地区
    type: select
    use: [provider1, provider2]
    filter: "(?i)^(?!.*(?:🇭🇰|🇯🇵|🇺🇸|🇸🇬|🇰🇷|🇨🇳|港|hk|hongkong|台|tw|taiwan|日|jp|japan|韩|kr|korea|新|sg|singapore|美|us|unitedstates|官网|重置|到期|剩余|流量|机场|客服|套餐|订阅|版本)).*"
    proxies: ["其它地区-自动选择"]
    icon: "https://fastly.jsdelivr.net/gh/Koolson/Qure@master/IconSet/Color/Global.png"

  - name: 低倍率节点
    type: select
    use: [provider1, provider2]
    filter: '(?i)^(?!.*(剩|期|流量|已用|节|官|客)).*(0\.[0-9]+(x|倍率|倍)?|低倍)'
    proxies: ["低倍率-自动选择"]
    icon: "https://fastly.jsdelivr.net/gh/Koolson/Qure@master/IconSet/Color/Available_1.png"

rules:
# ==================== 局域网（最优先） ====================
  - GEOSITE,private,直连
  - GEOIP,private,直连,no-resolve

  # ==================== TikTok ====================
  - GEOSITE,tiktok,TikTok

  # ==================== 分组服务 ====================
  - GEOSITE,youtube,YouTube
  - GEOSITE,github,Github
  - GEOSITE,netflix,NETFLIX
  - GEOSITE,bahamut,巴哈姆特
  - GEOSITE,bilibili,哔哩哔哩
  - GEOSITE,spotify,Spotify

  # ==================== AI ====================
  - GEOSITE,openai,AI         # 自动包含 chatgpt, oaistatic, oaiusercontent 等
  - GEOSITE,anthropic,AI      # 自动包含 claude 及其所有静态资源域名
  - GEOSITE,xai,AI            # 自动包含 x.ai, grok.com 等
  - GEOSITE,perplexity,AI     # 自动包含 perplexity 相关域名
  
  # 换回后缀匹配，避免因本地数据库未收录 midjourney 而报错
  - DOMAIN-SUFFIX,midjourney.com,AI
  - DOMAIN-SUFFIX,midjourney.io,AI
  - DOMAIN-KEYWORD,midjourney,AI
  
  # 独立/小众开发者工具
  - DOMAIN-SUFFIX,openrouter.ai,AI
  - DOMAIN-SUFFIX,devv.ai,AI

  # ==================== Google ====================
  - AND,((NETWORK,udp),(GEOSITE,google)),REJECT-DROP # ✅ 拦截谷歌的 UDP (QUIC) 流量，强制走 TCP 代理更稳定

  - GEOSITE,google,Google全家桶   # 这一行直接全包所有谷歌旗下子域名
  - GEOIP,google,Google全家桶     # IP 兜底

  # ==================== 国内外兜底 ====================
  - GEOSITE,CN,国内
  - GEOIP,CN,国内

  - GEOSITE,geolocation-!cn,其他

  - MATCH,其他
