proxy-providers:
  provider1:
    url: "xxx"
    type: http
    interval: 86400
    health-check:
      enable: true
      url: "https://www.gstatic.com/generate_204"
      interval: 300
    override:
      additional-prefix: "[provider1]"
  provider2:
    url: "xxx"
    type: http
    interval: 86400
    health-check:
      enable: true
      url: "https://www.gstatic.com/generate_204"
      interval: 300
    override:
      additional-prefix: "[provider2]"

proxies:
  - name: "直连"
    type: direct
    udp: true

mixed-port: 7890
ipv6: true
allow-lan: true
unified-delay: false
tcp-concurrent: true
external-controller: 127.0.0.1:9090
external-ui: ui
external-ui-url: "https://github.com/MetaCubeX/metacubexd/archive/refs/heads/gh-pages.zip"
geodata-mode: true
geox-url:
  geoip: "https://github.com/MetaCubeX/meta-rules-dat/releases/download/latest/geoip-lite.dat"
  geosite: "https://github.com/MetaCubeX/meta-rules-dat/releases/download/latest/geosite.dat"
  mmdb: "https://github.com/MetaCubeX/meta-rules-dat/releases/download/latest/country-lite.mmdb"
  asn: "https://github.com/MetaCubeX/meta-rules-dat/releases/download/latest/GeoLite2-ASN.mmdb"
find-process-mode: strict
global-client-fingerprint: chrome

profile:
  store-selected: true
  store-fake-ip: true

sniffer:
  enable: true
  sniff:
    HTTP:
      ports: [80, 8080-8880]
      override-destination: true
    TLS:
      ports: [443, 8443]
    QUIC:
      ports: [443, 8443]
  skip-domain:
    - "Mijia Cloud"
    - "+.push.apple.com"

tun:
  enable: true
  stack: mixed
  dns-hijack:
    - "any:53"
    - "tcp://any:53"
  auto-route: true
  auto-redirect: true
  auto-detect-interface: true

dns:
  enable: true
  ipv6: true
  enhanced-mode: fake-ip
  fake-ip-filter:
    - "*"
    - "+.lan"
    - "+.local"
    - "+.market.xiaomi.com"
  default-nameserver:
    - tls://223.5.5.5
    - tls://223.6.6.6
  nameserver:
    - https://doh.pub/dns-query
    - https://dns.alidns.com/dns-query

proxy-groups:
  # ==================== 1. 后台测速组（隐形，负责组内自动选择的逻辑） ====================
  - name: "🇭🇰 香港-自动选择"
    type: url-test
    include-all: true
    exclude-type: direct
    filter: "(?i)港|hk|hongkong|hong kong"
    tolerance: 10
    hidden: true

  - name: "🇹🇼 台湾-自动选择"
    type: url-test
    include-all: true
    exclude-type: direct
    filter: "(?i)台|tw|taiwan"
    tolerance: 10
    hidden: true

  - name: "🇯🇵 日本-自动选择"
    type: url-test
    include-all: true
    exclude-type: direct
    filter: "(?i)日|jp|japan"
    tolerance: 10
    hidden: true

  - name: "🇺🇸 美国-自动选择"
    type: url-test
    include-all: true
    exclude-type: direct
    filter: "(?i)美|us|unitedstates|united states"
    tolerance: 10
    hidden: true

  - name: "🇸🇬 新加坡-自动选择"
    type: url-test
    include-all: true
    exclude-type: direct
    filter: "(?i)(新|sg|singapore)"
    tolerance: 10
    hidden: true

  - name: "🌐 其它地区-自动选择"
    type: url-test
    include-all: true
    exclude-type: direct
    filter: "(?i)^(?!.*(?:🇭🇰|🇯🇵|🇺🇸|🇸🇬|🇨🇳|港|hk|hongkong|台|tw|taiwan|日|jp|japan|新|sg|singapore|美|us|unitedstates)).*"
    tolerance: 10
    hidden: true

  # ==================== 2. 核心控制分组（置顶可见） ====================
  - name: 默认
    type: select
    proxies:
      - 自动选择
      - 直连
      - 香港
      - 台湾
      - 日本
      - 新加坡
      - 美国
      - 其它地区
      - 全部节点
    icon: "https://fastly.jsdelivr.net/gh/Koolson/Qure@master/IconSet/Color/Proxy.png"

  - name: 自动选择
    type: url-test
    include-all: true
    exclude-type: direct
    tolerance: 10
    icon: "https://fastly.jsdelivr.net/gh/Koolson/Qure@master/IconSet/Color/Auto.png"

  - name: 全部节点
    type: select
    include-all: true
    exclude-type: direct
    icon: "https://fastly.jsdelivr.net/gh/Koolson/Qure@master/IconSet/Color/World_Map.png"

  # ==================== 3. 功能分流分组 ====================
  - name: AI
    type: select
    proxies: [默认, 香港, 台湾, 日本, 新加坡, 美国, 自动选择, 直连]
    icon: "https://fastly.jsdelivr.net/gh/Koolson/Qure@master/IconSet/Color/ChatGPT.png"

  - name: TikTok
    type: select
    proxies: [默认, 香港, 日本, 新加坡, 台湾, 美国, 自动选择, 直连]
    icon: "https://fastly.jsdelivr.net/gh/Koolson/Qure@master/IconSet/Color/TikTok.png"

  - name: Google
    type: select
    proxies:
      [默认, 香港, 台湾, 日本, 新加坡, 美国, 其它地区, 全部节点, 自动选择, 直连]
    icon: "https://fastly.jsdelivr.net/gh/Koolson/Qure@master/IconSet/Color/Google_Search.png"

  - name: YouTube
    type: select
    proxies:
      [默认, 香港, 台湾, 日本, 新加坡, 美国, 其它地区, 全部节点, 自动选择, 直连]
    icon: "https://fastly.jsdelivr.net/gh/Koolson/Qure@master/IconSet/Color/YouTube.png"

  - name: NETFLIX
    type: select
    proxies:
      [默认, 香港, 台湾, 日本, 新加坡, 美国, 其它地区, 全部节点, 自动选择, 直连]
    icon: "https://fastly.jsdelivr.net/gh/Koolson/Qure@master/IconSet/Color/Netflix.png"

  - name: Spotify
    type: select
    proxies:
      [默认, 香港, 台湾, 日本, 新加坡, 美国, 其它地区, 全部节点, 自动选择, 直连]
    icon: "https://fastly.jsdelivr.net/gh/Koolson/Qure@master/IconSet/Color/Spotify.png"

  - name: Github
    type: select
    proxies:
      [默认, 香港, 台湾, 日本, 新加坡, 美国, 其它地区, 全部节点, 自动选择, 直连]
    icon: "https://fastly.jsdelivr.net/gh/Koolson/Qure@master/IconSet/Color/GitHub.png"

  - name: 巴哈姆特
    type: select
    proxies:
      [默认, 香港, 台湾, 日本, 新加坡, 美国, 其它地区, 全部节点, 自动选择, 直连]
    icon: "https://fastly.jsdelivr.net/gh/Koolson/Qure@master/IconSet/Color/Bahamut.png"

  - name: 国内
    type: select
    proxies:
      [直连, 默认, 香港, 台湾, 日本, 新加坡, 美国, 其它地区, 全部节点, 自动选择]
    icon: "https://fastly.jsdelivr.net/gh/Koolson/Qure@master/IconSet/Color/China_Map.png"

  - name: 其他
    type: select
    proxies:
      [默认, 香港, 台湾, 日本, 新加坡, 美国, 其它地区, 全部节点, 自动选择, 直连]
    icon: "https://fastly.jsdelivr.net/gh/Koolson/Qure@master/IconSet/Color/Final.png"

  # ==================== 4. 地区可见分组（把对应的“隐形自动组”放到第一位，并嵌套全部节点过滤） ====================
  - name: 香港
    type: select
    use: [良心云, 维云云]
    filter: "(?i)港|hk|hongkong|hong kong"
    proxies:
      - "🇭🇰 香港-自动选择"
    icon: "https://fastly.jsdelivr.net/gh/Koolson/Qure@master/IconSet/Color/Hong_Kong.png"

  - name: 台湾
    type: select
    use: [良心云, 维云云]
    filter: "(?i)台|tw|taiwan"
    proxies:
      - "🇹🇼 台湾-自动选择"
    icon: "https://fastly.jsdelivr.net/gh/Koolson/Qure@master/IconSet/Color/Taiwan.png"

  - name: 日本
    type: select
    use: [良心云, 维云云]
    filter: "(?i)日|jp|japan"
    proxies:
      - "🇯🇵 日本-自动选择"
    icon: "https://fastly.jsdelivr.net/gh/Koolson/Qure@master/IconSet/Color/Japan.png"

  - name: 美国
    type: select
    use: [良心云, 维云云]
    filter: "(?i)美|us|unitedstates|united states"
    proxies:
      - "🇺🇸 美国-自动选择"
    icon: "https://fastly.jsdelivr.net/gh/Koolson/Qure@master/IconSet/Color/United_States.png"

  - name: 新加坡
    type: select
    use: [良心云, 维云云]
    filter: "(?i)(新|sg|singapore)"
    proxies:
      - "🇸🇬 新加坡-自动选择"
    icon: "https://fastly.jsdelivr.net/gh/Koolson/Qure@master/IconSet/Color/Singapore.png"

  - name: 其它地区
    type: select
    use: [良心云, 维云云]
    filter: "(?i)^(?!.*(?:🇭🇰|🇯🇵|🇺🇸|🇸🇬|🇨🇳|港|hk|hongkong|台|tw|taiwan|日|jp|japan|新|sg|singapore|美|us|unitedstates)).*"
    proxies:
      - "🌐 其它地区-自动选择"
    icon: "https://fastly.jsdelivr.net/gh/Koolson/Qure@master/IconSet/Color/Global.png"

rules:
  - GEOIP,lan,直连,no-resolve

  # ==================== AI 服务规则 ====================
  - GEOSITE,tiktok,TikTok

  # 所有 AI 网站
  - DOMAIN-SUFFIX,openai.com,AI
  - DOMAIN-SUFFIX,chat.openai.com,AI
  - DOMAIN-SUFFIX,chatgpt.com,AI
  - DOMAIN-SUFFIX,api.openai.com,AI
  - DOMAIN-SUFFIX,files.oaiusercontent.com,AI
  - DOMAIN-SUFFIX,anthropic.com,AI
  - DOMAIN-SUFFIX,claude.ai,AI
  - DOMAIN-SUFFIX,sora.com,AI
  - DOMAIN-SUFFIX,grok.com,AI
  - DOMAIN-SUFFIX,grok.x.ai,AI
  - DOMAIN-SUFFIX,x.ai,AI
  - DOMAIN-SUFFIX,gemini.google.com,AI
  - DOMAIN-SUFFIX,perplexity.ai,AI
  - DOMAIN-SUFFIX,midjourney.com,AI

  # 关键词兜底
  - DOMAIN-KEYWORD,chatgpt,AI
  - DOMAIN-KEYWORD,grok,AI
  - DOMAIN-KEYWORD,claude,AI
  - DOMAIN-KEYWORD,gemini,AI
  - DOMAIN-KEYWORD,perplexity,AI
  - DOMAIN-KEYWORD,midjourney,AI

  # 原有规则
  - GEOSITE,github,Github
  - GEOSITE,youtube,YouTube
  - GEOSITE,google,Google
  - GEOSITE,netflix,NETFLIX
  - GEOSITE,bahamut,巴哈姆特
  - GEOSITE,spotify,Spotify
  - GEOSITE,CN,国内
  - GEOSITE,geolocation-!cn,其他
  - GEOIP,google,Google
  - GEOIP,netflix,NETFLIX
  - GEOIP,CN,国内
  - MATCH,其他
